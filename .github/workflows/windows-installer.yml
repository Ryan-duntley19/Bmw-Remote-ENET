# Build and publish the Windows setup wizard + Host/Client packages.
#
# Artifacts:
#   BMW-ENET-Setup.exe                  — self-contained wizard (Host/Client packages embedded)
#   BMW-ENET-Host-windows-x64.zip       — desktop package
#   BMW-ENET-Client-windows-x64.zip     — laptop package
#   BMW-ENET-Windows-Installer.zip      — Setup.exe + both zips

name: Windows installer

on:
  push:
    branches: [main, "cursor/**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Npcap SDK (link wpcap for Host/Client L2)
        shell: pwsh
        run: |
          $sdk = "https://npcap.com/dist/npcap-sdk-1.13.zip"
          $zip = "$env:RUNNER_TEMP\npcap-sdk.zip"
          $out = "$env:RUNNER_TEMP\npcap-sdk"
          Invoke-WebRequest -Uri $sdk -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $out -Force
          $lib = Join-Path $out "Lib\x64"
          if (-not (Test-Path $lib)) { $lib = Join-Path $out "Lib" }
          echo "LIB=$lib" >> $env:GITHUB_ENV
          echo "NPCAP_LIB_DIR=$lib" >> $env:GITHUB_ENV
          Get-ChildItem -Recurse $out | Select-Object -First 40 FullName

      - name: Build role binaries
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: |
          cargo build --release `
            -p enet-setup `
            -p enet-gateway `
            -p enet-agent `
            -p enet-gui `
            -p enet-relay

      - name: Stage Host and Client packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/host, dist/client, crates/enet-installer/embedded | Out-Null

          Copy-Item target/release/enet-gateway.exe dist/host/
          Copy-Item target/release/enet-setup.exe dist/host/
          Copy-Item target/release/enet-gui.exe dist/host/
          if (Test-Path config) { Copy-Item -Recurse config dist/host/config }

          Copy-Item target/release/enet-agent.exe dist/client/
          Copy-Item target/release/enet-setup.exe dist/client/
          if (Test-Path config) { Copy-Item -Recurse config dist/client/config }

          Compress-Archive -Path "dist/host/*" -DestinationPath dist/BMW-ENET-Host-windows-x64.zip -Force
          Compress-Archive -Path "dist/client/*" -DestinationPath dist/BMW-ENET-Client-windows-x64.zip -Force

          # Bake packages into Setup.exe (required for private GitHub repos)
          Copy-Item dist/BMW-ENET-Host-windows-x64.zip crates/enet-installer/embedded/ -Force
          Copy-Item dist/BMW-ENET-Client-windows-x64.zip crates/enet-installer/embedded/ -Force

      - name: Build self-contained Setup wizard
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release -p enet-installer --features embed

      - name: Stage release files
        shell: pwsh
        run: |
          Copy-Item target/release/BMW-ENET-Setup.exe dist/BMW-ENET-Setup.exe -Force
          Compress-Archive -Path @(
            "dist/BMW-ENET-Setup.exe",
            "dist/BMW-ENET-Host-windows-x64.zip",
            "dist/BMW-ENET-Client-windows-x64.zip"
          ) -DestinationPath dist/BMW-ENET-Windows-Installer.zip -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BMW-ENET-Windows-Installer
          path: |
            dist/BMW-ENET-Setup.exe
            dist/BMW-ENET-Host-windows-x64.zip
            dist/BMW-ENET-Client-windows-x64.zip
            dist/BMW-ENET-Windows-Installer.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BMW-ENET-Setup.exe
            dist/BMW-ENET-Host-windows-x64.zip
            dist/BMW-ENET-Client-windows-x64.zip
            dist/BMW-ENET-Windows-Installer.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
